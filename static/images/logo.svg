<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Background rounded square -->
  <rect width="48" height="48" rx="12" fill="url(#grad)"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a4f9c"/>
      <stop offset="100%" stop-color="#0f325f"/>
    </linearGradient>
  </defs>

  <!-- Stethoscope head (chest piece) -->
  <circle cx="24" cy="34" r="5.5" fill="none" stroke="white" stroke-width="2.2"/>
  <circle cx="24" cy="34" r="2.5" fill="white" opacity="0.5"/>

  <!-- Stethoscope tube: down from head, curves up to earpiece -->
  <!-- Left ear tube -->
  <path d="M18.5 34 C14 34 11 30 11 25 C11 18 16 14 16 14" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
  <!-- Right ear tube -->
  <path d="M29.5 34 C34 34 37 30 37 25 C37 18 32 14 32 14" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>

  <!-- Ear tips -->
  <circle cx="16" cy="13.5" r="2.2" fill="white"/>
  <circle cx="32" cy="13.5" r="2.2" fill="white"/>

  <!-- Small cross on chest piece to show medical -->
  <line x1="24" y1="31.5" x2="24" y2="36.5" stroke="#1a4f9c" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="21.5" y1="34" x2="26.5" y2="34" stroke="#1a4f9c" stroke-width="1.5" stroke-linecap="round"/>
</svg>
